# Render.com Blueprint
# Deploy with: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: pattern-coach-api
    runtime: python
    buildCommand: pip install -r requirements.txt --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: pattern_coach
      - key: JWT_SECRET
        generateValue: true
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /api/health
